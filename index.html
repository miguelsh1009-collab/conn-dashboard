<style>
:root {
  --bg:#0d0f14; --card:#141720; --bg3:#1c2030;
  --border:rgba(255,255,255,0.07); --text:#e8ecf0; --muted:#6b7585;
  --accent:#4f8ef7; --primary:#4f8ef7;
  --danger:#f87171; --success:#34d399; --warn:#fbbf24;
  --font:'Noto Sans SC',sans-serif;
  color-scheme: light dark;
}
@media(prefers-color-scheme:light){
  :root{
    --bg:#f5f7fa; --card:#ffffff; --bg3:#edf0f5;
    --border:rgba(0,0,0,0.08); --text:#1a1d23; --muted:#8b95a3;
    --accent:#2563eb; --primary:#2563eb;
    --danger:#dc2626; --success:#059669; --warn:#d97706;
  }
  .cmp-table tr:hover td{background:rgba(0,0,0,0.025)!important}
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;min-height:100vh}

/* Topbar */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;gap:16px;height:52px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:500;letter-spacing:.03em}
.tabs{display:flex;gap:2px;padding:2px;background:var(--bg3);border-radius:8px}
.tab{padding:5px 18px;border-radius:6px;cursor:pointer;color:var(--muted);font-size:13px;border:none;background:none;font-family:var(--font)}
.tab.active{background:var(--accent);color:#fff}
.updated{color:var(--muted);font-size:12px;margin-left:auto}
.upload-btn{padding:6px 16px;border-radius:6px;background:rgba(79,142,247,0.12);border:1px solid rgba(79,142,247,0.3);color:var(--accent);cursor:pointer;font-size:12px;white-space:nowrap;font-family:var(--font);transition:all .2s}
.upload-btn:hover{background:rgba(79,142,247,0.22)}
#fileInput{display:none}
.upload-toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text);z-index:999;display:none;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.container{max-width:1400px;margin:0 auto;padding:20px 28px}
.page{display:none}.page.active{display:block}

/* Cards */
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
.section-hd{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.section-title{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.kpi-label{color:var(--muted);font-size:11px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.kpi-val{font-size:24px;font-weight:700;letter-spacing:-.02em}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:4px}

/* Week compare table */
.cmp-table{width:100%;border-collapse:collapse}
.cmp-table th{text-align:left;padding:8px 12px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.04em}
.cmp-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;white-space:nowrap}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-table tr:hover td{background:rgba(79,142,247,0.04)}
.num{font-variant-numeric:tabular-nums}
.up{color:var(--danger)}.dn{color:var(--success)}.flat{color:var(--muted)}
.metric-name{font-weight:500;color:var(--text)}
.metric-sub{font-size:11px;color:var(--muted)}

/* Chart */
.chart-area{height:320px}
.chart-area-lg{height:400px}

/* Type toggles */
.type-pills{display:flex;gap:6px;flex-wrap:wrap}
.type-pill{padding:3px 10px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;transition:all .15s;font-family:var(--font)}
.type-pill.on{color:#fff}

/* Week nav */
.week-nav{display:flex;gap:6px;flex-wrap:wrap}
.week-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--font)}
.week-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Chart row */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.chart-row{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}}
.period-note{font-size:11px;color:var(--muted);padding:4px 10px;background:var(--bg3);border-radius:6px}
</style>

<script>
// ── tooltip with 环比 ──
// seriesCfg: [{key, isRate}] — isRate=true → show pp diff; false → show % relative change
function makeTip(weeksRef, seriesCfg, fmtFn) {
  return {
    trigger:'axis', backgroundColor:'#1a1d2e', borderColor:'#2a2d3e',
    textStyle:{color:'#e2e8f0',fontSize:12},
    formatter: params => {
      const i = params[0].dataIndex;
      const weeks = weeksRef();
      let html = `<b>${params[0].axisValue}</b><br>`;
      params.forEach((p, pi) => {
        const cur = p.value;
        const cfg = seriesCfg[pi] || {};
        const key = cfg.key;
        const isRate = cfg.isRate || false;
        const prev = (i > 0 && key && weeks[i-1]) ? weeks[i-1][key] : null;
        let chgTxt = '';
        if (cur != null && prev != null) {
          if (isRate) {
            const diff = cur - prev;
            const sign = diff >= 0 ? '+' : '';
            const col = diff >= 0 ? '#ef4444' : '#22c55e';
            chgTxt = ` <span style="color:${col}">${sign}${diff.toFixed(2)}pp</span>`;
          } else if (prev !== 0) {
            const pct = (cur - prev) / Math.abs(prev) * 100;
            const sign = pct >= 0 ? '+' : '';
            const col = pct >= 0 ? '#ef4444' : '#22c55e';
            chgTxt = ` <span style="color:${col}">${sign}${pct.toFixed(1)}%</span>`;
          }
        }
        html += `${p.marker}${p.seriesName}：${cur != null ? fmtFn(cur, pi) : '--'}${chgTxt}<br>`;
      });
      return html;
    }
  };
}

// ── palette ──
const COLORS = ['#6366f1','#22d3ee','#f59e0b','#ef4444','#34d399','#a78bfa','#fb923c','#60a5fa','#f472b6'];
const CONN_TYPES = [
  {key:'rate_total',     label:'总连接量',      color:'#6366f1'},
  {key:'rate_active',    label:'主动连接',       color:'#f59e0b'},
  {key:'rate_tel_conn',  label:'电话接通量',     color:'#22d3ee'},
  {key:'rate_chat_eff',  label:'有效微聊对数',   color:'#34d399'},
  {key:'rate_view_conn', label:'带看接通量',     color:'#a78bfa'},
  {key:'rate_sub',       label:'关注订阅',       color:'#fb923c'},
  {key:'rate_ai',        label:'AI评测',         color:'#60a5fa'},
  {key:'rate_3d',        label:'3D看房',         color:'#f472b6'},
  {key:'rate_broad',     label:'泛连接',         color:'#94a3b8'},
  {key:'rate_video',     label:'视频评测',       color:'#ef4444'},
];

let rawAJK=[], rawW58=[], rawIdle=[];
let ajkWeeks=[], w58Weeks=[], idleWeeks=[];
let selAjkWeek=0, selW58Week=0, selIdleWeek=0;
let idleSelCity='全国';
let activeTypes = new Set(CONN_TYPES.map(t=>t.key));
let chartAjkTrend=null, chartAjkUv=null, chartAjkConn=null;
let chartW58Uv=null, chartW58Conn=null, chartW58Dev=null, chartW58Retain=null;
let chartIdleCnt=null, chartIdleVcuv=null, chartIdleLead=null;

// ── helpers ──
function chartOpts(){ return { backgroundColor:'transparent', tooltip:{trigger:'axis',backgroundColor:'var(--card, #141720)',borderColor:'rgba(255,255,255,0.07)',textStyle:{color:'#e8ecf0',fontSize:12}}, legend:{textStyle:{color:'#6b7585'},top:0,type:'scroll'}, grid:{left:55,right:20,top:36,bottom:50} }; }
function xAxis(data){ return {data, axisLabel:{color:'#6b7585',fontSize:11,rotate:30}, axisLine:{lineStyle:{color:'rgba(255,255,255,0.07)'}}}; }
function yAxis(fmt){ return {axisLabel:{color:'#6b7585',fontSize:11,formatter:fmt||null}, splitLine:{lineStyle:{color:'rgba(255,255,255,0.07)'}}}; }
function fmt(v,d=2){ return v==null?'--':Number(v).toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:d}); }
function fmtW(v){ return v==null?'--':(v/10000).toFixed(2)+'万'; }
function fmtPct(v){ return v==null?'--':v.toFixed(2)+'%'; }
function chgEl(cur,prev,isRate=false){
  if(cur==null||prev==null) return '<span class="flat">--</span>';
  const diff = cur-prev;
  const pct = prev!==0 ? diff/Math.abs(prev)*100 : null;
  const cls = diff>0?'up':diff<0?'dn':'flat';
  const sign = diff>0?'+':'';
  const diffStr = isRate ? `${sign}${diff.toFixed(2)}pp` : `${sign}${fmt(diff,0)}`;
  const pctStr = pct!=null ? `${sign}${pct.toFixed(1)}%` : '--';
  return `<span class="${cls}">${diffStr}</span>|<span class="${cls}">${pctStr}</span>`;
}

// ── week aggregation: rolling 7-day windows backwards from last date ──
function groupByWeek(daily){
  const sorted = [...daily].sort((a,b)=>a.date.localeCompare(b.date));
  if(!sorted.length) return [];
  const lastD = new Date(sorted[sorted.length-1].date+'T00:00:00');

  const map = {};
  sorted.forEach(d => {
    const diff = Math.round((lastD - new Date(d.date+'T00:00:00'))/86400000);
    const idx = Math.floor(diff/7); // 0=当前周, 1=上周, ...
    if(!map[idx]) map[idx] = {idx, days:[],
      _uv:0,_vcuv:0,_vcpv:0,
      _active_conn:0,_tel_conn:0,_chat_eff:0,_view_conn:0,
      _conn_total:0,_conn_sub:0,_conn_ai:0,_conn_3d:0,_conn_broad:0,_conn_video:0,
      _conn_computed:0};
    const w = map[idx];
    w.days.push(d.date);
    if(d.uv)   w._uv   += d.uv;
    if(d.vcuv) w._vcuv += d.vcuv;
    if(d.vcpv) w._vcpv += d.vcpv;
    ['active_conn','tel_conn','chat_eff','view_conn',
     'conn_total','conn_sub','conn_ai','conn_3d','conn_broad','conn_video'].forEach(k=>{
      if(d[k]) w['_'+k] += d[k];
    });
    // 新口径总连接 = 主动连接 + 其他
    w._conn_computed += (d.active_conn||0) + (d.conn_sub||0) + (d.conn_ai||0) + (d.conn_3d||0) + (d.conn_broad||0) + (d.conn_video||0);
  });
  // sort descending by idx → oldest (high idx) first, newest (idx=0) last
  return Object.values(map).sort((a,b)=>b.idx-a.idx).map(w => {
    const n = w.days.length;
    const avg = k => Math.round(w['_'+k]/n);
    const uv = avg('uv'), vcuv = avg('vcuv'), vcpv = avg('vcpv');
    const rate = k => vcuv ? +(avg(k)/vcuv*100).toFixed(4) : null;
    // week label from actual date range
    const ds = w.days.slice().sort();
    w.week = ds[0]; // start date for reference
    w.weekEnd = ds[ds.length-1];
    return { ...w,
      uv, vcuv, vcpv,
      vcuv_rate: uv   ? +(vcuv/uv*100).toFixed(4) : null,
      vcpv_vcuv: vcuv ? +(vcpv/vcuv).toFixed(4)   : null,
      active_conn:avg('active_conn'), tel_conn:avg('tel_conn'), chat_eff:avg('chat_eff'), view_conn:avg('view_conn'),
      conn_computed:avg('conn_computed'),
      conn_total:avg('conn_total'), conn_sub:avg('conn_sub'), conn_ai:avg('conn_ai'),
      conn_3d:avg('conn_3d'), conn_broad:avg('conn_broad'), conn_video:avg('conn_video'),
      rate_active:rate('active_conn'), rate_tel_conn:rate('tel_conn'), rate_chat_eff:rate('chat_eff'), rate_view_conn:rate('view_conn'),
      rate_computed:rate('conn_computed'),
      rate_total:rate('conn_total'), rate_sub:rate('conn_sub'), rate_ai:rate('conn_ai'),
      rate_3d:rate('conn_3d'), rate_broad:rate('conn_broad'), rate_video:rate('conn_video'),
    };
  });
}

function groupByWeek58(daily){
  const sorted = [...daily].filter(d=>d.uv).sort((a,b)=>a.date.localeCompare(b.date));
  if(!sorted.length) return [];
  const lastD = new Date(sorted[sorted.length-1].date+'T00:00:00');

  const map = {};
  sorted.forEach(d => {
    const diff = Math.round((lastD - new Date(d.date+'T00:00:00'))/86400000);
    const idx = Math.floor(diff/7);
    if(!map[idx]) map[idx] = {idx, days:[],
      _uv:0,_uv_app:0,_uv_mini:0,_vcuv:0,_conn:0,
      _retain_sum:0,_retain_n:0};
    const w = map[idx];
    w.days.push(d.date);
    w._uv      += d.uv||0;
    w._uv_app  += d.uv_app||0;
    w._uv_mini += d.uv_mini||0;
    w._vcuv    += d.vcuv||0;
    w._conn    += d.conn||0;
    if(d.retain_1d!=null){ w._retain_sum += d.retain_1d; w._retain_n++; }
  });
  return Object.values(map).sort((a,b)=>b.idx-a.idx).map(w=>{
    const n = w.days.length;
    const avg = k => Math.round(w['_'+k]/n);
    const uv=avg('uv'), vcuv=avg('vcuv'), conn=avg('conn');
    const ds = w.days.slice().sort();
    w.week = ds[0]; w.weekEnd = ds[ds.length-1];
    return { ...w,
      uv, uv_app:avg('uv_app'), uv_mini:avg('uv_mini'),
      vcuv, conn,
      vcuv_rate: uv ? +(vcuv/uv*100).toFixed(4) : null,
      conn_rate: vcuv ? +(conn/vcuv*100).toFixed(4) : null,
      retain_1d: w._retain_n ? +(w._retain_sum/w._retain_n*100).toFixed(2) : null,
    };
  });
}

function wLabel(weekStart, days){
  // use actual date range from days array
  const f = s => { const d=new Date(s+'T00:00:00'); return `${d.getMonth()+1}.${d.getDate()}`; };
  if(days && days.length){
    const ds = days.slice().sort();
    return `${f(ds[0])}～${f(ds[ds.length-1])}`;
  }
  return weekStart||'';
}

function groupByWeekIdle(daily){
  const sorted = [...daily].filter(d=>d.online_cnt).sort((a,b)=>a.date.localeCompare(b.date));
  if(!sorted.length) return [];
  const lastD = new Date(sorted[sorted.length-1].date+'T00:00:00');
  const map = {};
  sorted.forEach(d=>{
    const diff = Math.round((lastD - new Date(d.date+'T00:00:00'))/86400000);
    const idx = Math.floor(diff/7);
    if(!map[idx]) map[idx]={idx,days:[],
      _online_cnt:0,_online_vcuv:0,_lead_total:0,_unsold_cnt:0,
      _placed_cnt:0,_placed_vcuv:0,_lead_adv:0,_lead_brk:0,_lead_placed:0};
    const w=map[idx];
    w.days.push(d.date);
    ['online_cnt','online_vcuv','lead_total','unsold_cnt',
     'placed_cnt','placed_vcuv','lead_adv','lead_brk','lead_placed'].forEach(k=>{
      if(d[k]) w['_'+k]+=d[k];
    });
  });
  return Object.values(map).sort((a,b)=>b.idx-a.idx).map(w=>{
    const ds=w.days.slice().sort();
    const n=[...new Set(ds)].length; // 按唯一日期数算日均，城市数据每天多行不重复计
    const avg=k=>Math.round(w['_'+k]/n);
    w.week=ds[0]; w.weekEnd=ds[ds.length-1];
    w.days=[...new Set(ds)]; // 去重，避免显示"532天"
    const online_cnt=avg('online_cnt'), online_vcuv=avg('online_vcuv');
    const unsold_cnt=avg('unsold_cnt'), placed_cnt=avg('placed_cnt');
    const placed_vcuv=avg('placed_vcuv'), lead_total=avg('lead_total');
    const lead_adv=avg('lead_adv'), lead_brk=avg('lead_brk'), lead_placed=avg('lead_placed');
    const rate=k=>avg(k)>0 ? null : null; // placeholder
    return {...w,
      online_cnt, online_vcuv, lead_total, unsold_cnt,
      placed_cnt, placed_vcuv, lead_adv, lead_brk, lead_placed,
      placed_rate:  unsold_cnt ? +(placed_cnt/unsold_cnt*100).toFixed(4) : null,
      placed_rate2: online_cnt ? +(placed_cnt/online_cnt*100).toFixed(4) : null,
      placed_vcuv_rate: online_vcuv ? +(placed_vcuv/online_vcuv*100).toFixed(4) : null,
      lead_conv:    placed_vcuv ? +(lead_placed/placed_vcuv*100).toFixed(4) : null,
      lead_brk_rate:lead_total  ? +(lead_brk/lead_total*100).toFixed(4) : null,
    };
  });
}

function parseIdleCsvLine(line){
  const res=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur);cur='';}
    else cur+=c;
  }
  res.push(cur);
  return res;
}

function handleIdleCsvUpload(e){
  const file=e.target.files[0]; if(!file) return;
  e.target.value='';
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const bytes=new Uint8Array(ev.target.result);
      let text;
      try{text=new TextDecoder('gbk').decode(bytes);}catch(_){text=new TextDecoder('utf-8').decode(bytes);}
      const lines=text.split('\n');
      // 找表头行（含"日期"和"城市"）
      const hIdx=lines.findIndex(l=>l.includes('日期')&&l.includes('城市'));
      if(hIdx<0){showToast('未找到表头（需含日期、城市列）',true);return;}
      const num=v=>{const n=parseFloat((v||'').replace(/,/g,''));return isNaN(n)?0:n;};
      const map={};
      for(let i=hIdx+1;i<lines.length;i++){
        const cols=parseIdleCsvLine(lines[i]);
        if(cols.length<10) continue;
        const date=(cols[0]||'').trim();
        if(!/^\d{4}-\d{2}-\d{2}$/.test(date)) continue;
        const city=(cols[1]||'').trim();
        if(!city) continue;
        const key=date+'|'+city;
        if(!map[key]) map[key]={date,city,online_cnt:0,online_vcuv:0,lead_total:0,unsold_cnt:0,placed_cnt:0,placed_vcuv:0,lead_placed:0,lead_brk:0};
        const r=map[key];
        // 列映射：3=在线楼盘数 4=在线VCUV 5=微聊+电话线索 6=非售罄盘 7=投放成功盘 8=投放盘VCUV 9=投放盘线索 10=经纪人线索
        r.online_cnt  +=num(cols[3]); r.online_vcuv +=num(cols[4]);
        r.lead_total  +=num(cols[5]); r.unsold_cnt  +=num(cols[6]);
        r.placed_cnt  +=num(cols[7]); r.placed_vcuv +=num(cols[8]);
        r.lead_placed +=num(cols[9]); r.lead_brk    +=num(cols[10]);
      }
      rawIdle=Object.values(map).map(r=>({
        date:r.date, city:r.city,
        online_cnt:Math.round(r.online_cnt), online_vcuv:Math.round(r.online_vcuv),
        lead_total:Math.round(r.lead_total), unsold_cnt:Math.round(r.unsold_cnt),
        placed_cnt:Math.round(r.placed_cnt), placed_vcuv:Math.round(r.placed_vcuv),
        lead_placed:Math.round(r.lead_placed), lead_brk:Math.round(r.lead_brk),
        lead_adv:Math.max(0,Math.round(r.lead_placed-r.lead_brk)),
      }));
      // 持久化到 localStorage
      const saved=JSON.parse(localStorage.getItem('conn_data')||'{}');
      saved.idle=rawIdle;
      localStorage.setItem('conn_data',JSON.stringify(saved));
      const cityCount=[...new Set(rawIdle.map(d=>d.city))].length;
      showToast(`城市数据解析完成：${cityCount}个城市，${rawIdle.length}条记录`,false);
      renderIdle();
    }catch(err){showToast('解析失败：'+err.message,true);}
  };
  reader.readAsArrayBuffer(file);
}

function buildIdleCityFilter(){
  const cities = [...new Set(rawIdle.map(d=>d.city).filter(Boolean))].sort();
  const wrap = document.getElementById('idleCityBtns');
  const all = ['全国', ...cities];
  wrap.innerHTML = all.map(c =>
    `<button onclick="selectIdleCity('${c}')" id="idleCityBtn_${c.replace(/\s/g,'_')}"
      style="padding:4px 12px;border-radius:5px;border:1px solid var(--border);background:${c===idleSelCity?'var(--accent)':'var(--bg)'};
      color:${c===idleSelCity?'#fff':'var(--muted)'};font-size:12px;cursor:pointer;font-family:var(--font);white-space:nowrap">${c}</button>`
  ).join('');
}

function selectIdleCity(city){
  idleSelCity=city;
  buildIdleCityFilter();
  const filtered = city==='全国' ? rawIdle : rawIdle.filter(d=>d.city===city);
  idleWeeks=groupByWeekIdle(filtered);
  selIdleWeek=idleWeeks.length-1;
  buildIdleWeekNav();
  renderIdleKpi();
  renderIdleCmp();
  renderIdleCharts();
}

function renderIdle(){
  if(!rawIdle.length) return;
  idleSelCity='全国';
  buildIdleCityFilter();
  const filtered = rawIdle; // 默认全国
  idleWeeks=groupByWeekIdle(filtered);
  selIdleWeek=idleWeeks.length-1;
  buildIdleWeekNav();
  renderIdleKpi();
  renderIdleCmp();
  renderIdleCharts();
}

function buildIdleWeekNav(){
  const nav=document.getElementById('idleWeekNav');

// ── upload helpers ──
function formatDate(v) {
  if (!v) return '';
  if (typeof v === 'string') return v.slice(0, 10);
  if (v instanceof Date) {
    return v.getFullYear() + '-' + String(v.getMonth()+1).padStart(2,'0') + '-' + String(v.getDate()).padStart(2,'0');
  }
  // Excel serial number (days since 1900-01-01, with leap year bug)
  if (typeof v === 'number') {
    const d = new Date(Date.UTC(1900, 0, 1) + (v - 2) * 86400000);
    return d.getUTCFullYear() + '-' + String(d.getUTCMonth()+1).padStart(2,'0') + '-' + String(d.getUTCDate()).padStart(2,'0');
  }
  return String(v).slice(0, 10);
}

function showToast(msg, isErr=false) {
  const t = document.getElementById('uploadToast');
  t.textContent = msg;
  t.style.display = 'block';
  t.style.borderColor = isErr ? '#ef4444' : '#6366f1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', isErr ? 5000 : 3000);
}

async function handleUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  showToast('正在解析…', false);
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'}); // raw serial numbers for dates — timezone-safe

    // ── AJK sheet ──
    const ajkWs = wb.Sheets['ajk'];
    if (!ajkWs) { showToast('未找到 ajk sheet', true); return; }
    const ajkRows = XLSX.utils.sheet_to_json(ajkWs, {header:1, raw:true});
    const ajkData = [];
    for (let i = 1; i < ajkRows.length; i++) {
      const r = ajkRows[i];
      const dateStr = formatDate(r[0]);
      if (!dateStr || dateStr.length < 8) continue;
      const num = v => (v == null || v === '' || (typeof v === 'string' && isNaN(+v))) ? null : +v;
      const uv = num(r[1]), vcuv = num(r[2]), vcpv = num(r[3]);
      if (!uv && !vcuv) continue; // skip empty rows
      const tel_dial = num(r[26]), tel_rate_ai = num(r[28]);
      const adv_dial = num(r[29]), adv_rate   = num(r[30]);
      const brk_dial = num(r[31]), brk_rate   = num(r[32]);
      const view_cnt = num(r[12]), vr_rate     = num(r[34]);
      const tel_conn  = (tel_dial||0)*(tel_rate_ai||0) + (adv_dial||0)*(adv_rate||0) + (brk_dial||0)*(brk_rate||0);
      const view_conn = (view_cnt||0) * (vr_rate||0);
      const chat_eff  = num(r[10]) || 0;
      const active_conn = Math.round(tel_conn + view_conn + chat_eff);
      const conn_sub = num(r[11]), conn_ai = num(r[13]), conn_3d = num(r[14]);
      const conn_broad = num(r[15]), conn_video = num(r[16]);
      const conn_total = num(r[8]);
      const rate = (n, d) => (d && n != null) ? +(n/d*100).toFixed(4) : null;
      ajkData.push({
        date: dateStr,
        uv, vcuv, vcpv,
        vcuv_rate: rate(vcuv, uv),
        tel_conn: Math.round(tel_conn), chat_eff: num(r[10]), view_conn: Math.round(view_conn),
        active_conn,
        conn_total, conn_sub, conn_ai, conn_3d, conn_broad, conn_video,
        rate_active:   rate(active_conn, vcuv),
        rate_tel_conn: rate(tel_conn, vcuv),
        rate_chat_eff: rate(chat_eff, vcuv),
        rate_view_conn:rate(view_conn, vcuv),
        rate_total:    rate(conn_total, vcuv),
        rate_sub:      rate(conn_sub, vcuv),
        rate_ai:       rate(conn_ai, vcuv),
        rate_3d:       rate(conn_3d, vcuv),
        rate_broad:    rate(conn_broad, vcuv),
        rate_video:    rate(conn_video, vcuv),
      });
    }

    // ── 58 sheet ──
    const w58Ws = wb.Sheets['58'];
    if (!w58Ws) { showToast('未找到 58 sheet', true); return; }
    const w58Rows = XLSX.utils.sheet_to_json(w58Ws, {header:1, raw:true});
    const w58Data = [];
    for (let i = 1; i < w58Rows.length; i++) {
      const r = w58Rows[i];
      const dateStr = formatDate(r[0]);
      if (!dateStr || dateStr.length < 8) continue;
      const num = v => (v == null || v === '' || v === 'NaN' || (typeof v === 'string' && isNaN(+v))) ? null : +v;
      const uv_app  = num(r[4]),  uv_mini  = num(r[5]);
      const vcuv_app= num(r[11]), vcuv_mini= num(r[12]);
      const conn_app= num(r[25]), conn_mini= num(r[26]);
      const uv   = (uv_app||0)   + (uv_mini||0)   || null;
      const vcuv = (vcuv_app||0) + (vcuv_mini||0) || null;
      const conn = (conn_app||0) + (conn_mini||0) || null;
      w58Data.push({
        date: dateStr,
        uv, uv_app, uv_mini,
        vcuv, vcuv_app, vcuv_mini,
        conn, conn_app, conn_mini,
        vcuv_rate: (uv&&vcuv) ? +(vcuv/uv*100).toFixed(4) : null,
        conn_rate: (vcuv&&conn) ? +(conn/vcuv*100).toFixed(4) : null,
        retain_1d: num(r[30]),
      });
    }

    // ── 闲置投放 sheet ──
    const idleWs = wb.Sheets['闲置投放'];
    const idleData = [];
    if (idleWs) {
      const idleRows = XLSX.utils.sheet_to_json(idleWs, {header:1, raw:true});
      // 检测是否有城市列：若第2列（col 1）是字符串则为城市名
      const hasCityCol = idleRows.length > 1 && typeof idleRows[1][1] === 'string' && isNaN(+idleRows[1][1]);
      const o = hasCityCol ? 1 : 0; // 列偏移
      for (let i = 1; i < idleRows.length; i++) {
        const r = idleRows[i];
        const dateStr = formatDate(r[0]);
        if (!dateStr || dateStr.length < 8) continue;
        const city = hasCityCol ? (r[1]||'').trim() : null;
        const num = v => (v == null || v === '' || (typeof v === 'string' && isNaN(+v))) ? null : +v;
        const online_cnt  = num(r[1+o]), online_vcuv = num(r[2+o]), lead_total = num(r[3+o]);
        const unsold_cnt  = num(r[4+o]), placed_cnt  = num(r[5+o]), placed_vcuv= num(r[6+o]);
        const lead_adv    = num(r[7+o]), lead_brk    = num(r[8+o]);
        if (!online_cnt) continue;
        const lead_placed = (lead_adv||0)+(lead_brk||0) || null;
        idleData.push({
          date: dateStr,
          ...(city ? {city} : {}),
          online_cnt:  Math.round(online_cnt),
          online_vcuv: Math.round(online_vcuv||0),
          lead_total:  Math.round(lead_total||0),
          unsold_cnt:  Math.round(unsold_cnt||0),
          placed_cnt:  Math.round(placed_cnt||0),
          placed_vcuv: Math.round(placed_vcuv||0),
          lead_adv:    Math.round(lead_adv||0),
          lead_brk:    Math.round(lead_brk||0),
          lead_placed: lead_placed ? Math.round(lead_placed) : null,
          placed_rate:     (placed_cnt&&unsold_cnt)    ? +(placed_cnt/unsold_cnt*100).toFixed(4)    : null,
          placed_rate2:    (placed_cnt&&online_cnt)    ? +(placed_cnt/online_cnt*100).toFixed(4)    : null,
          placed_vcuv_rate:(placed_vcuv&&online_vcuv) ? +(placed_vcuv/online_vcuv*100).toFixed(4) : null,
          lead_conv:       (lead_placed&&placed_vcuv) ? +(lead_placed/placed_vcuv*100).toFixed(4) : null,
          lead_brk_rate:   (lead_brk&&lead_total)     ? +(lead_brk/lead_total*100).toFixed(4)     : null,
        });
      }
    }

    // persist to localStorage
    localStorage.setItem('conn_data', JSON.stringify({ajk:ajkData, w58:w58Data, idle:idleData}));
    rawAJK = ajkData; rawW58 = w58Data; rawIdle = idleData;
    const lastDate = ajkData[ajkData.length-1]?.date || '--';
    document.getElementById('updatedText').textContent = '数据至：'+lastDate;

    // dispose old charts before re-render
    [chartAjkTrend,chartAjkUv,chartAjkConn,chartW58Uv,chartW58Conn,chartW58Dev,chartW58Retain,
     chartIdleCnt,chartIdleVcuv,chartIdleLead].forEach(c=>c&&c.dispose());
    chartAjkTrend=chartAjkUv=chartAjkConn=chartW58Uv=chartW58Conn=chartW58Dev=chartW58Retain=
    chartIdleCnt=chartIdleVcuv=chartIdleLead=null;

    renderAjk();
    showToast(`解析完成：AJK ${ajkData.length}天，58 ${w58Data.length}天，闲置 ${idleData.length}天`, false);
  } catch(e) {
    console.error(e);
    showToast('解析失败：'+e.message, true);
  }
  event.target.value = '';
}

// ── load ──
async function loadData(){
  // try localStorage first (from previous upload)
  const cached = localStorage.getItem('conn_data');
  if (cached) {
    try {
      const d = JSON.parse(cached);
      if (d.ajk && d.ajk.length) {
        rawAJK = d.ajk; rawW58 = d.w58||[]; rawIdle = d.idle||[];
        const lastDate = rawAJK[rawAJK.length-1]?.date || '--';
        document.getElementById('updatedText').textContent = '数据至：'+lastDate;
        renderAjk();
        return;
      }
    } catch(e) { localStorage.removeItem('conn_data'); }
  }
  // fall back to bundled data
  try{
    const res = await fetch('./data/data.json?t='+Date.now());
    const d = await res.json();
    rawAJK = d.ajk; rawW58 = d.w58||[]; rawIdle = d.idle||[];
    const lastDate = rawAJK[rawAJK.length-1].date;
    document.getElementById('updatedText').textContent = '数据至：'+lastDate;
    renderAjk();
  } catch(e){
    console.error(e);
    document.getElementById('updatedText').textContent = '加载失败：'+e.message;
  }
}

loadData();
</script>
